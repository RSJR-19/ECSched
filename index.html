<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECSched</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
</head>
<body>
    <div class="opening-screen" id="openingScreen">
        <img src="ECS.png" alt="logo" class="logo-pic" id="logo">

        <div class="opening-box" id="openingBox">
            <div class="upload-menu" id="uploadMenu">
                <input type="file" id="fileInput" accept=".pdf" class="file-input">
                
                <div class="upload-text-box">
                    <div class="upload-logo">
                        <img src="plus_file.png" alt="plus file icon">
                    </div>
                    <span>Upload your EAF</span>
                </div>

            </div>
            <div class="return-menu" id="returnMenu">
               <div class="welcome-textbox">
                <p id="welcomeBackP"></p>
               </div>
               <button id="scheduleBtn">See Schedule</button>
            </div>
        </div>
    </div>
    <div id="welcomeScreen">
        <p class="welcome-screen-p" id="welcomeScreenP">Welcome</p>
    </div>
    
    <button id="extractBtn">Extract me</button>
    <button id="clearBtn">Clear Data</button>



    <script type="module" src="script_logic.js"></script>
    <script type="module" src="script_front.js"></script>
    <script src="test.js" type="module"></script>
</body>
</html>
